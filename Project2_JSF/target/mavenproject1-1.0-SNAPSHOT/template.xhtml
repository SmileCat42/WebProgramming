<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"> <h:head>
        <title><ui:insert name="title">Home</ui:insert></title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png"
              href="#{resource['img:icon.png']}" />

        <h:outputStylesheet library="css" name="bootstrap.min.css" />
        <h:outputStylesheet library="css" name="Kanit.css"/>

        <style>
            body {
                font-family: 'Kanit', sans-serif;
                background-color: #f4f7f9;
            }
            .main-content {
                padding: 20px;
                min-height: 100vh;
            }
            .sidebar-admin {
                background: #ffffff;
                border-right: 1px solid #dee2e6;
                height: 100vh;
            }
            .custom-navbar {
                margin-bottom: 0;
                border-radius: 0;
            }
            /* ปรับแต่งความสูงเลเยอร์ PrimeFaces */
            .ui-menu {
                width: 100% !important;
                border: none !important;
            }

            .logout-menu .ui-menuitem-text {
                color: #dc3545 !important;
                font-weight: 500;
            }
            .logout-menu .ui-menuitem-icon {
                color: #dc3545 !important;
            }

            .ui-menu.custom-side-menu .ui-menu-list.ui-widget-content {
                background-color: #eef5f9 !important;
            }

            .custom-side-menu .ui-menuitem-link {
                background-color: transparent !important;
                color: #495057 !important;
            }

            .custom-side-menu .ui-menuitem-link:hover {
                background-color: #dceaf3 !important;
            }
            .custom-side-menu .ui-menu-list.ui-widget-content {
    background-color: #eef5f9 !important;
}

            /* hover effect */
            .custom-side-menu .ui-menuitem-link:hover {
                background-color: #dceaf3 !important;
            }

            .custom-side-menu.ui-menu,
            .custom-side-menu .ui-menu-list {
                background-color: #eef5f9 !important;
            }
            .sidebar-admin {
                background: #ffffff;
            }
            .sidebar-admin {
                background: #eef5f9;
            }
        </style>
    </h:head>

    <h:body>

        <h:form>
            <p:menubar styleClass="custom-navbar px-4 shadow-sm">
                <p:menuitem outcome="index">
                    <h:graphicImage library="img" name="icon5.png" height="35" style="vertical-align: middle;" />
                </p:menuitem>

                <p:menuitem value="Home" outcome="index" icon="pi pi-home" />
                <p:menuitem value="About" outcome="dashboard" icon="pi pi-info-circle" />
                <p:menuitem value="News" outcome="dashboard" icon="pi pi-megaphone" />
                <p:button value="Logout" icon="pi pi-sign-out" styleClass="ui-button-danger" />

                <f:facet name="options">
                    <div class="ui-input-icon-left mr-2" style="display: inline-block; margin-right: 10px;">
                        <i class="pi pi-search" />
                        <p:inputText placeholder="Search..."/>
                    </div>
                    <p:button value="Search" 
                              styleClass="ui-button-success rounded-pill shadow-sm"
                              style="padding: 5px 20px; font-weight: 500; border: none; background: linear-gradient(135deg, #28a745 0%, #218838 100%);" />
                </f:facet>
            </p:menubar>
        </h:form>

        <a href="#">
            <h:graphicImage library="img" name="bg18.png" style="vertical-align: middle;" /></a>

        <div class="container-fluid">
            <div class="row">
                <div class="col-md-3 col-lg-2 d-none d-md-block sidebar-admin p-0 shadow-sm">
                    <div class="p-4 text-center border-bottom">
                        <p:avatar shape="circle" style="width:120px;height:120px">
                            <h:graphicImage library="img" name="pf.jpg" />
                        </p:avatar>
                    </div>

                    <h:form style="background-color: #eef5f9;">
                        <p:menu toggleable="true" style="width:100%" styleClass="custom-side-menu">
                            <p:submenu label="Main Menu">
                                <p:menuitem value="Dashboard" outcome="dashboard" icon="pi pi-chart-bar"/>
                                <p:menuitem value="Student List" outcome="template" icon="pi pi-users"/>
                            </p:submenu>
                            <p:submenu label="Management">
                                <p:menuitem value="Manage Courses" outcome="list" icon="pi pi-book"/>
                                <p:menuitem value="Enrollments" outcome="template" icon="pi pi-briefcase"/>
                            </p:submenu>
                            <p:submenu label="System">
                                <p:menuitem value="Settings" outcome="template" icon="pi pi-cog"/>
                            </p:submenu>
                            <p:menuitem value="Logout"
                                        action="#{loginBean.logout}"
                                        icon="pi pi-sign-out"
                                        styleClass="logout-menu"/>
                        </p:menu>
                    </h:form>
                </div>

                <main class="col-md-9 ms-sm-auto col-lg-10 main-content">
                    <p:card style="margin-top: 3px; min-height: 80vh;">
                        <ui:insert name="content" />
                    </p:card>
                </main>
            </div>
        </div>

        <h:outputScript library="js" name="bootstrap.bundle.min.js" />
    </h:body>
</html>
