<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">


    <h:head>
        <title><ui:insert name="title">Welcome to Admin mode</ui:insert></title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png"
              href="#{resource['img:icon.png']}" />
        <style>
            .hero-section {
                position: relative;
                min-height: 100vh;
                background: url("#{resource['img/bg11.jpg']}") center/cover no-repeat;
            }

            .hero-overlay {
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    rgba(0,0,0,0.85),
                    rgba(0,0,0,0.6)
                    );
            }

            .hero-content {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 400px;
                padding: 40px;
                background: rgba(0,0,0,0.6);
                border-radius: 15px;
            }
            /* จัดการแถบข้อความเลื่อน */
            .scrolling-bar-container {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
                background-color: midnightblue
            }

            .scroll-box {
                display: inline-block;
                white-space: nowrap;
                padding-left: 100%;
                animation: my-scroll 15s linear infinite;
            }
            .border.p-1.overflow-hidden {
                margin-top: 0 !important; /* ดันขึ้นไปให้ติดขอบบน */
                border-top: none;         /* เอาเส้นขอบบนออกเพื่อให้เนียนไปกับเมนู (ถ้าต้องการ) */
            }
            @keyframes my-scroll {
                0%   {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(-100%);
                }
            }

            /* ขยับปุ่ม Login */
            .login-btn-spacing {
                margin-left: 25px !important;
            }
        </style>
        <!-- Bootstrap CSS -->
        <h:outputStylesheet library="css" name="bootstrap.min.css" />
        <h:outputStylesheet library="css" name="Kanit.css"/>
    </h:head>
    <h:body>


        <section class="hero-section d-flex align-items-start">
            <div class="hero-overlay"></div>

            <div class="container position-relative z-1">
                <div class="row align-items-center">

                    <!-- รูปด้านซ้าย -->
                    <div class="col-md-6 text-center " style="margin-top: 40px;">
                        <img src="#{resource['img:log.png']}" 
                             class="img-fluid" 
                             style="max-height:500px;" />
                    </div>

                    <!-- กล่อง login ด้านขวา -->
                    <div class="col-md-6 d-flex justify-content-center align-items-center">
                        <div class="login-box container hero-content" style="font-family: 'Kanit', sans-serif;">
                            <!-- ฟอร์ม login เดิมของคุณ -->

                            <h:form styleClass="p-fluid">

                                <p:messages id="messages" showDetail="true" closable="true"/>

                                <p:panel header="Login" styleClass="shadow-4 border-round-lg">

                                    <div class="p-field p-grid">
                                        <p:outputLabel for="username" value="Username" class="p-col-4"/>
                                        <div class="p-col-8">
                                            <p:inputText id="username" value="#{loginBean.username}" />
                                        </div>
                                    </div>

                                    <div class="p-field p-grid">
                                        <p:outputLabel for="password" value="Password" class="p-col-4"/>
                                        <div class="p-col-8">
                                            <p:password id="password" value="#{loginBean.password}" feedback="false"/>
                                        </div>
                                    </div>

                                    <div style="text-align:center;">
                                        <p:commandButton value="Login"
                                                         icon="pi pi-sign-in"
                                                         action="#{loginBean.login}"
                                                         update="@form"
                                                         process="@form"
                                                         ajax="true"
                                                         styleClass="w-full mt-3 ui-button-primary"/>
                                    </div>
                                </p:panel>
                                
                                

                        </h:form>
                    </div>
                </div>

            </div>
            </div>
        </section>
        <!-- Bootstrap JS -->
        <h:outputScript library="js" name="bootstrap.bundle.min.js" />

    </h:body>
</html>
