<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="jakarta.tags.core"> 

    <h:head>
        <title><ui:insert name="title">Welcome to Admin mode</ui:insert></title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png"
              href="#{resource['img:icon.png']}" />
        <style>
            .hero-section {
                position: relative;
                min-height: 100vh;
                background: url("#{resource['img/bg11.jpg']}") center/cover no-repeat;
            }

            .hero-overlay {
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    rgba(0,0,0,0.85),
                    rgba(0,0,0,0.6)
                    );
            }

            .hero-content {
                position: relative;
                z-index: 1;
                max-width: 700px;
                padding: 80px 40px;
                font-family: "Kanit", sans-serif;
            }
            /* จัดการแถบข้อความเลื่อน */
            .scrolling-bar-container {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
                background-color: midnightblue
            }

            .scroll-box {
                display: inline-block;
                white-space: nowrap;
                padding-left: 100%;
                animation: my-scroll 15s linear infinite;
            }
            .border.p-1.overflow-hidden {
                margin-top: 0 !important; /* ดันขึ้นไปให้ติดขอบบน */
                border-top: none;         /* เอาเส้นขอบบนออกเพื่อให้เนียนไปกับเมนู (ถ้าต้องการ) */
            }
            .banner-img {
                object-fit: cover;
                max-height: 600px;
            }
            @keyframes my-scroll {
                0%   {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(-100%);
                }
            }

            /* ขยับปุ่ม Login */
            .login-btn-spacing {
                margin-left: 25px !important;
            }
            body {
                font-family: 'Kanit', sans-serif;
                background-color: #f4f7f9;
            }
            .main-content {
                padding: 20px;
                min-height: 100vh;
            }
            .sidebar-admin {
                background: #ffffff;
                border-right: 1px solid #dee2e6;
                height: 100vh;
            }
            .custom-navbar {
                margin-bottom: 0;
                border-radius: 0;
            }
            /* ปรับแต่งความสูงเลเยอร์ PrimeFaces */
            .ui-menu {
                width: 100% !important;
                border: none !important;
            }
        </style>
        <!-- Bootstrap CSS -->
        <h:outputStylesheet library="css" name="bootstrap.min.css" />
        <h:outputStylesheet library="css" name="Kanit.css"/>
    </h:head>
    <h:body style="background-color: #86b7fe;">

        <!-- NAVBAR --> 
        <h:form>
            <p:menubar styleClass="custom-navbar px-4 shadow-sm">
                <p:menuitem outcome="index">
                    <h:graphicImage library="img" alt="โลโก้โรงเรียน"  name="df5.png" height="35" style="vertical-align: middle;" />
                </p:menuitem>

                <p:menuitem value="Home" outcome="index" icon="pi pi-home" />
                <p:menuitem value="About" outcome="dashboard" icon="pi pi-info-circle" />

                <p:menuitem value="News" url="https://forcms6.wordpress.com" icon="pi pi-megaphone" />



                <f:facet name="options">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <p:selectOneMenu value="#{themeBean.theme}" style="margin-left:10px;">
                            <f:selectItem itemLabel="☀ Saga" itemValue="saga"/>
                            <f:selectItem itemLabel="🌧 Vela" itemValue="vela"/>
                            <f:selectItem itemLabel="🌙 Arya" itemValue="arya"/>
                            <p:ajax update="@all"/>
                        </p:selectOneMenu>
                        <div class="ui-input-icon-left mr-2" style="display: inline-block; margin-right: 10px;">
                            <i class="pi pi-search" />
                            <p:inputText placeholder="Search..."/>
                        </div>
                        <p:button value="Search" 
                                  styleClass="ui-button-success rounded-pill shadow-sm"
                                  style="padding: 4px 20px; font-weight: 500; border: none; background: linear-gradient(135deg, #28a745 0%, #218838 100%);" />
                        <p:commandButton value="Login"
                                         action="#{navigationBean.navigate('login')}"
                                         update="mainContent" 
                                         icon="pi pi-sign-in"
                                         styleClass="ui-button-primary rounded-pill shadow-sm"
                                         style="margin-left:10px; padding: 5px 20px; font-weight: 500;" />
                    </div>
                </f:facet>
            </p:menubar>
        </h:form>


        <!-- SCROLL TEXT -->
        <div class="border p-1 overflow-hidden text-light scrolling-bar-container border.p-1.overflow-hidden">
            <div class="scroll-box">
                <b>Welcome to Administrator mode. Login for editor</b>
            </div>
        </div>



            <h:panelGroup id="mainContent">
                <ui:include src="#{navigationBean.currentPage}" />
            </h:panelGroup>


        <!-- Bootstrap JS -->
        <h:outputScript library="js" name="bootstrap.bundle.min.js" />

    </h:body>
</html>
